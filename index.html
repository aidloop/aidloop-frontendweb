<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aid Loop Organizational login </title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="form-container">
        <div class="logo-wrapper"><img src="logo aidloop.png" alt=""></div>
    <div class="form-title">
        <h3>Organizer Login</h3>
         <p id="sign">Sign in to access your organizers dashboard, manage <br> volunteer events, and track participant activity </p>
    </div>
   

    
    <form action="login" class="form">
        <div class="form-group">
            <label for="text">Email Address</label>
            <input type="text" name="Email" placeholder="you@example.com" style="font-size: 8px; color: #8190A5; padding-left: 10px;"> 
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" name="password" placeholder="Your password here" style="font-size: 8px; color: #8190A5; padding-left: 10px;">
            
        </div>
    </form>
    <div class="btn-container">
        <button class="btn-org">Log in</button> <br>

        <div class="link"><a href="#">Forgot Password</a>
        <a href="#">Register Organization</a></div>

        <div class="acc"><p>Don't have an account? </p><a href="#" class="link">Register Organization</a></div>
    </div>
    </div>

    
    
</body>
</html>
