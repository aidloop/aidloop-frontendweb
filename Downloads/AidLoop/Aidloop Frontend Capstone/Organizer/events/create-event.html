<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Create Event</title>

  <link rel="stylesheet" href="../assets/css/shared.css" />
  <link rel="stylesheet" href="create-event.css" />

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
  />
</head>

<body>
<div class="dashboard-layout">

  <!-- SIDEBAR -->
   <aside class="sidebar">
    <div class="sidebar-logo">
      <img src="/assets/Images/Logo.png" />
    </div>

    <ul class="sidebar-menu">
      <li><a href="../dashboard/organizer-dashboard.html">Dashboard</a></li>
      <li class="active"><a href="create-event.html">Create Events</a></li>
      <li><a href="event-listing.html">Events</a></li>
      <li><a href="../volunteers/volunteers.html">Volunteers</a></li>
      <li><a href="../certificates/organizer-certificates.html">Certificates</a></li>
      <li><a href="../profile/organizer-profile.html">Profile</a></li>
      <li><button id="logoutBtn">Log out</button></li>
    </ul>
  </aside>

   MAIN 
  <main class="main-content">

    <header class="topbar">
      <h1>Create Event</h1>
    </header>

    <section class="form-section"> 

      <!-- IMAGE -->
       <div class="image-upload" id="imageBox">
        <input type="file" id="imageInput" hidden />
        <i class="fa-solid fa-camera"></i>
        <p>Upload Event Image</p>
      </div> 

      <!-- FORM -->
       <form id="eventForm">

        <label>Event Name</label>
        <input type="text" id="name" required />

        <label>Category</label>
        <input type="text" id="category" placeholder="Community Service" />

        <label>Volunteer Roles</label>
        <div class="tags-input">
          <input type="text" id="roleInput" placeholder="Enter role" />
          <button type="button" id="addRole">+</button>
        </div>
        <div id="rolesList"></div>

        <label>Description</label>
        <textarea id="description"></textarea>

        <label>Requirements</label>
        <textarea id="requirements"></textarea>

        <div class="grid-2">
          <div>
            <label>Date</label>
            <input type="date" id="date" />
          </div>

          <div>
            <label>Start Time</label>
            <input type="time" id="startTime" />
          </div>
        </div>

        <div class="grid-2">
          <div>
            <label>End Time</label>
            <input type="time" id="endTime" />
          </div>

          <div>
            <label>City</label>
            <input type="text" id="city" />
          </div>
        </div>

        <label>Venue</label>
        <input type="text" id="venue" />

        <label>Number of Volunteers</label>
        <input type="number" id="slots" value="10" />

        <label>
          Certificates
          <input type="checkbox" id="certificateEnabled" />
        </label>

        <div class="actions">
          <button type="button" id="saveDraft">Save Draft</button>
          <button type="submit">Publish Event</button>
        </div>

        <p id="formMsg"></p>

      </form>

    </section>

  </main>
</div>

<script type="module" src="create-event.js"></script>
</body>
</html>
