<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AIDLoop Admin Login</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="admin-login.css" />
  
</head>
<body>
  <main class="login-page">
    <section class="login-card">
      <div class="logo-wrap">
        <img src="../../assets/Images/Logo.png" alt="AIDLoop logo" class="logo" />
        <p class="tagline">Connecting Volunteers to verified community events</p>
      </div>

      <h1>Log in</h1>

      <form id="loginForm" novalidate>
        <div class="form-group">
          <label for="email">Email Address</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="Enter your email address"
            required/>
          <small class="error-message" id="emailError"></small>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="password-wrap">
            <input
              type="password"
              id="password"
              name="password"
              placeholder="Enter your password"
              required/>
            <button
              type="button"
              class="toggle-password"
              id="togglePassword"
              aria-label="Toggle password visibility">
              <i class="fa-regular fa-eye-slash"></i>
            </button>
          </div>
          <small class="error-message" id="passwordError"></small>
        </div>

        <label class="remember-wrap">
          <input type="checkbox" id="rememberMe" />
          <span class="custom-check">
            <i class="fa-solid fa-check"></i>
          </span>
          <span class="remember-text">Remember Me</span>
        </label>

        <small class="error-message form-error" id="formError"></small>
        <small class="success-message" id="formSuccess"></small>

        <div class="button-group">
          <button type="submit" class="btn btn-primary" id="loginBtn">
            Log in
          </button>
          <button type="button" class="btn btn-secondary" id="forgotPasswordBtn">
            Forgot Password
          </button>
        </div>
      </form>
    </section>
  </main>

  <script src="admin-login.js"></script>
</body>
</html>
