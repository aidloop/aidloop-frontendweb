<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Certificate Preview</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="certificate-preview.css" />
 
</head>
<body>
  <div class="overlay" id="overlay">
    <div class="modal">
      <button class="close-btn" id="closeBtn" aria-label="Close">
        <i class="fa-solid fa-xmark"></i>
      </button>

      <h1>Certificate Preview</h1>

      <div class="details-grid">
        <div class="label">Volunteer Name:</div>
        <div class="value" id="volunteerName">Loading...</div>

        <div class="label">Event Name:</div>
        <div class="value" id="eventName">Loading...</div>

        <div class="label">Phone No:</div>
        <div class="value" id="phoneNumber">—</div>

        <div class="label">Org. Name:</div>
        <div class="value" id="organizerName">—</div>

        <div class="label">Events Date:</div>
        <div class="value" id="eventDate">—</div>
      </div>

      <div class="certificate-card">
        <div class="certificate-icon">
          <i class="fa-regular fa-id-card"></i>
          <i class="fa-solid fa-award badge-icon"></i>
        </div>
        <p id="certificateStatus">ISSUED</p>
      </div>

      <p id="feedback" class="feedback"></p>

      <div class="action-row">
        <button class="action-btn secondary-btn" id="downloadBtn" type="button">
          Download Certificate
        </button>
      </div>
    </div>
  </div>

  <script src="certificate-preview.js"></script>
</body>
</html>
