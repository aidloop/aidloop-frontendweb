<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verification Details</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="verification-details.css" />
</head>
<body>
  <main class="page">
    <section class="card">
      <div class="card-header">
        <h1 id="orgTitle">Loading...</h1>
        <span id="statusBadge" class="status-badge awaiting">Awaiting Verification</span>
      </div>

      <div class="details-grid">
        <div class="label">Org. Name:</div>
        <div class="value" id="orgName">Loading...</div>

        <div class="label">Social Links:</div>
        <div class="value" id="socialLinks">—</div>

        <div class="label">Email:</div>
        <div class="value" id="email">—</div>

        <div class="label">Phone No:</div>
        <div class="value" id="phoneNumber">—</div>

        <div class="label">Location:</div>
        <div class="value" id="location">—</div>
      </div>

      <div class="description-section">
        <h2>Description</h2>
        <div class="description-box" id="description">
          <p>Loading organization description...</p>
        </div>
      </div>

      <div class="actions">
        <button id="rejectBtn" class="btn btn-reject" type="button">Reject</button>
        <button id="approveBtn" class="btn btn-approve" type="button">Approve</button>
      </div>

      <p id="feedback" class="feedback"></p>
    </section>
  </main>

  <script src="verification-details.js"></script>
</body>
</html>
