<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flag Details</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="flag-details.css" />
</head>
<body>
  <div class="overlay" id="overlay">
    <div class="modal-card">
      <button class="close-btn" id="closeBtn" aria-label="Close modal">&times;</button>

      <div class="modal-header">
        <h1 id="orgTitle">Loading...</h1>
        <span class="severity-badge low" id="severityBadge">Loading...</span>
      </div>

      <div class="details-grid">
        <div class="label">Org. Name:</div>
        <div class="value" id="orgName">Loading...</div>

        <div class="label">Flag Reason:</div>
        <div class="value" id="flagReason">—</div>

        <div class="label">Last Event Cancelled</div>
        <div class="value" id="lastEventCancelled">—</div>
      </div>

      <div class="description-section">
        <h2>Description</h2>
        <div class="description-box" id="description">
          Loading organizer description...
        </div>
      </div>

      <p id="feedback" class="feedback"></p>

      <div class="action-row">
        <button class="contact-btn" id="contactBtn" type="button">Contact Organizer</button>
      </div>
    </div>
  </div>

  <script src="flag-details.js"></script>
</body>
</html>
