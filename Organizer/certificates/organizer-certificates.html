<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AIDLoop Organizer Certificates</title>

   <link rel="stylesheet" href="organizer-certificates.css" />

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
  />
</head>
<body>
  <div class="dashboard-layout">
    <aside class="sidebar">
      <div class="sidebar-logo">
        <img src="../../assets/Images/Logo.png" alt="AIDLoop Logo" />
      </div>

      <ul class="sidebar-menu">
        <li>
          <a href="../dashboard/organizer-dashboard.html">
            <i class="fa-regular fa-house"></i>
            <span>Dashboard</span>
          </a>
        </li>

        <li>
          <a href="../events/create-event.html">
            <i class="fa-regular fa-square-plus"></i>
            <span>Create Events</span>
          </a>
        </li>

        <li>
          <a href="../events/event-listing.html">
            <i class="fa-regular fa-calendar"></i>
            <span>Events</span>
          </a>
        </li>

        <li>
          <a href="../volunteers/volunteers.html">
            <i class="fa-solid fa-users"></i>
            <span>Volunteers</span>
          </a>
        </li>

        <li class="active">
          <a href="organizer-certificates.html">
            <i class="fa-regular fa-id-card"></i>
            <span>Certificates</span>
          </a>
        </li>

        <li>
          <a href="../profile/organizer-profile.html">
            <i class="fa-regular fa-address-card"></i>
            <span>Profile</span>
          </a>
        </li>

        <li>
          <button type="button" id="logoutBtn" class="sidebar-logout">
            <i class="fa-solid fa-arrow-right-from-bracket"></i>
            <span>Log out</span>
          </button>
        </li>
      </ul>
    </aside>

    <main class="main-content">
      <header class="topbar">
        <div class="topbar-left">
          <h1 class="page-title">Certificates</h1>
          <p class="page-subtitle">Manage volunteer certificates</p>
        </div>

        <div class="topbar-right">
          <button class="icon-btn" type="button">
            <i class="fa-regular fa-bell"></i>
          </button>

          <button class="icon-btn" type="button">
            <i class="fa-regular fa-circle-user"></i>
          </button>
        </div>
      </header>

      <section class="page-content">
        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-icon gold">
              <i class="fa-solid fa-trophy"></i>
            </div>
            <div class="stat-text">
              <p>TOTAL CERTIFICATES</p>
              <h3 id="totalCertificates">0</h3>
            </div>
          </div>

          <div class="stat-card">
            <div class="stat-icon green">
              <i class="fa-solid fa-circle-check"></i>
            </div>
            <div class="stat-text">
              <p>ISSUED</p>
              <h3 id="issuedCertificates">0</h3>
            </div>
          </div>

          <div class="stat-card">
            <div class="stat-icon pink">
              <i class="fa-solid fa-anchor-circle-exclamation"></i>
            </div>
            <div class="stat-text">
              <p>PENDING</p>
              <h3 id="pendingCertificates">0</h3>
            </div>
          </div>
        </div>

        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>Name</th>
                <th>EVENT</th>
                <th>Date</th>
                <th>Status</th>
                <th></th>
              </tr>
            </thead>

            <tbody id="certificatesTable">
              <tr>
                <td colspan="5">Loading certificates...</td>
              </tr>
            </tbody>
          </table>
        </div>

        <div class="table-footer">
          <p id="tableCountText">Showing 0 of 0 certificates</p>

          <div class="pagination">
            <button type="button" class="page-btn">Prev</button>
            <button type="button" class="page-btn active">1</button>
            <button type="button" class="page-btn">2</button>
            <button type="button" class="page-btn">Next</button>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script type="module" src="organizer-certificates.js"></script>
</body>
</html>
