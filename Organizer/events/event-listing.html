<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AIDLoop Organizer Events</title>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="event-listing.css" />
</head>
<body>
  <div class="dashboard-layout">
    <aside class="sidebar">
      <div class="sidebar-logo">
        <img src="../../assets/Images/Logo.png" alt="AIDLoop Logo" />
      </div>

      <ul class="sidebar-menu">
        <li>
          <a href="../dashboard/organizer-dashboard.html">
            <i class="fa-regular fa-house"></i><span>Dashboard</span>
          </a>
        </li>
        <li>
          <a href="create-event.html">
            <i class="fa-regular fa-square-plus"></i><span>Create Events</span>
          </a>
        </li>
        <li class="active">
          <a href="event-listing.html">
            <i class="fa-regular fa-calendar"></i><span>Events</span>
          </a>
        </li>
        <li>
          <a href="../volunteers/volunteers.html">
            <i class="fa-solid fa-users"></i><span>Volunteers</span>
          </a>
        </li>
        <li>
          <a href="../certificates/organizer-certificates.html">
            <i class="fa-regular fa-id-card"></i><span>Certificates</span>
          </a>
        </li>
        <li>
          <a href="../profile/organizer-profile.html">
            <i class="fa-regular fa-address-card"></i><span>Profile</span>
          </a>
        </li>
        <li>
          <button type="button" id="logoutBtn" class="sidebar-logout">
            <i class="fa-solid fa-arrow-right-from-bracket"></i><span>Log out</span>
          </button>
        </li>
      </ul>
    </aside>

    <main class="main-content">
      <header class="topbar">
        <div>
          <h1 class="page-title">Events</h1>
          <p class="page-subtitle">Browse and Manage all your events</p>
        </div>

        <div class="topbar-actions">
          <a href="create-event.html" class="create-event-btn">Create Event</a>
          <button class="icon-btn" type="button"><i class="fa-regular fa-bell"></i></button>
          <div class="profile-mini">
            <img id="organizerAvatar" src="https://i.pravatar.cc/100?img=12" alt="Organizer Avatar" />
          </div>
        </div>
      </header>

      <section class="events-section">
        <div class="filter-tabs">
          <button class="filter-btn active" data-filter="all">All</button>
          <button class="filter-btn" data-filter="draft">Draft</button>
          <button class="filter-btn" data-filter="published">Published</button>
          <button class="filter-btn" data-filter="cancelled">Cancelled</button>
        </div>

        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>Events Name</th>
                <th>Location</th>
                <th>Date</th>
                <th>Volunteers</th>
                <th>Status</th>
                <th></th>
              </tr>
            </thead>

            <tbody id="eventsTable">
              <tr>
                <td colspan="6">Loading events...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <script type="module" src="event-listing.js"></script>
</body>
</html>
