<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verify Your Email</title>
 
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../../assets/css/shared.css" />
  <link rel="stylesheet" href="verify-email.css" />
</head>
<body>
  <main class="verify-page">
    <section class="verify-card">
      <div class="icon-wrap">
        <div class="mail-box">
          <i class="fa-regular fa-envelope"></i>
        </div>
      </div>

      <h1>Verify Your Email</h1>

      <div class="divider"></div>

      <p class="message">
        We've sent a verification link to your email address.
        Please check your inbox and click the link to continue.
      </p>

      <p class="email-text" id="emailText"></p>

      <small id="formError" class="form-error"></small>
      <small id="formSuccess" class="success-message"></small>

      <button id="resendBtn" class="primary-btn">Resend Email</button>
    </section>
  </main>

  <script type="module" src="verify-email.js"></script>
</body>
</html>
